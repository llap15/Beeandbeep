name: beeandbig
description: BeeAndBig - Find your perfect place to stay

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # HTTP & API
  dio: ^5.8.0

  # Local Storage
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.2
  firebase_messaging: ^15.2.4

  # Images
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # UI Components
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  carousel_slider: ^5.0.0
  flutter_rating_bar: ^4.0.1
  table_calendar: ^3.1.3
  intl: ^0.20.2

  # Social Login
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4

  # Utilities
  uuid: ^4.5.1
  equatable: ^2.0.7
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  logger: ^2.5.0
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/